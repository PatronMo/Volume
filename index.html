<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume Bar</title>

<style>
    body {
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
        width: 300px;
    }

    .percentage-text {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .bar-background {
        width: 100%;
        height: 30px;
        background-color: #ddd;
        border-radius: 8px;
        overflow: hidden;
    }

    .bar-fill {
        height: 100%;
        width: 73.93%;
        background-color: black;
        transition: width 0.5s ease;
    }
</style>
</head>

<body>

<div class="container">
    <div class="percentage-text">73.93 L</div>
    <div class="bar-background">
        <div class="bar-fill"></div>
    </div>
</div>

</body>
</html>
