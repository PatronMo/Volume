<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Volume Bar</title>

<style>
    body {
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .container {
        width: 350px;
        text-align: center;
    }

    .volume-text {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .slider {
        -webkit-appearance: none;
        width: 100%;
        height: 30px;
        background: #ddd;
        border-radius: 8px;
        outline: none;
        cursor: pointer;
        position: relative;
    }

    .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 0px;
        height: 30px;
        background: black;
        cursor: pointer;
    }

    .slider::-moz-range-thumb {
        width: 0px;
        height: 30px;
        background: black;
        cursor: pointer;
        border: none;
    }
</style>
</head>

<body>

<div class="container">
    <div class="volume-text" id="volumeValue">50.00%</div>
    <input type="range" min="0" max="100" value="50" step="0.01" class="slider" id="volumeSlider">
</div>

<script>
    const slider = document.getElementById("volumeSlider");
    const volumeText = document.getElementById("volumeValue");

    function updateSliderBackground(value) {
        slider.style.background = `linear-gradient(to right, black ${value}%, #ddd ${value}%)`;
    }

    function updateVolume() {
        const value = parseFloat(slider.value).toFixed(2);
        volumeText.textContent = value + "%";
        updateSliderBackground(value);
    }

    slider.addEventListener("input", updateVolume);

    // Initialize
    updateVolume();
</script>

</body>
</html>
